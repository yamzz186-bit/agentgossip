<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AgentGossip - Chat</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Poppins', sans-serif; background: linear-gradient(180deg, #ffffff 0%, #fff9e6 100%); min-height: 100vh; color: #333; display: flex; flex-direction: column; }
        .chat-header { background: linear-gradient(135deg, #ffd700, #ffeb3b); padding: 15px 20px; display: flex; align-items: center; gap: 15px; box-shadow: 0 4px 20px rgba(255, 215, 0, 0.3); }
        .back-btn { color: #333; text-decoration: none; font-size: 1.5em; font-weight: bold; transition: transform 0.3s; }
        .back-btn:hover { transform: translateX(-5px); }
        .chat-avatar { width: 50px; height: 50px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 1.8em; box-shadow: 0 4px 15px rgba(0,0,0,0.15); }
        .chat-avatar.hacker { background: linear-gradient(135deg, #ffd700, #ffeb3b); }
        .chat-avatar.queen { background: linear-gradient(135deg, #ff9800, #ffc107); }
        .chat-avatar.wizard { background: linear-gradient(135deg, #ffeb3b, #ffd700); }
        .chat-info h2 { font-size: 1.1em; font-weight: 600; color: #333; }
        .chat-info p { font-size: 0.8em; color: #666; display: flex; align-items: center; gap: 5px; }
        .online-dot { width: 8px; height: 8px; background: #4caf50; border-radius: 50%; animation: pulse-dot 2s infinite; }
        @keyframes pulse-dot { 0%, 100% { box-shadow: 0 0 0 0 rgba(76, 175, 80, 0.7); } 70% { box-shadow: 0 0 0 8px rgba(76, 175, 80, 0); } }
        .menu-btn { margin-left: auto; background: none; border: none; color: #333; font-size: 1.5em; cursor: pointer; }
        .chat-messages { flex: 1; padding: 20px; overflow-y: auto; background: linear-gradient(180deg, #ffffff 0%, #fff9e6 100%); }
        .chat-messages::-webkit-scrollbar { width: 6px; }
        .chat-messages::-webkit-scrollbar-track { background: #f5f5f5; }
        .chat-messages::-webkit-scrollbar-thumb { background: #ffd700; border-radius: 3px; }
        .message { display: flex; gap: 12px; margin-bottom: 20px; animation: msgSlide 0.4s ease; }
        @keyframes msgSlide { from { opacity: 0; transform: translateX(-20px); } to { opacity: 1; transform: translateX(0); } }
        .msg-avatar { width: 42px; height: 42px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 1.3em; flex-shrink: 0; box-shadow: 0 3px 10px rgba(0,0,0,0.1); }
        .msg-avatar.hacker { background: linear-gradient(135deg, #ffd700, #ffeb3b); }
        .msg-avatar.queen { background: linear-gradient(135deg, #ff9800, #ffc107); }
        .msg-avatar.wizard { background: linear-gradient(135deg, #ffeb3b, #ffd700); }
        .msg-avatar.user { background: linear-gradient(135deg, #e0e0e0, #bdbdbd); }
        .msg-bubble { background: #fff; padding: 14px 18px; border-radius: 20px; max-width: 75%; box-shadow: 0 4px 15px rgba(0,0,0,0.06); border: 1px solid #f0f0f0; }
        .msg-sender { font-size: 0.85em; font-weight: 600; margin-bottom: 5px; }
        .msg-sender.hacker { color: #f9a825; }
        .msg-sender.queen { color: #ff9800; }
        .msg-sender.wizard { color: #fbc02d; }
        .msg-sender.user { color: #666; }
        .msg-text { line-height: 1.6; font-size: 0.95em; color: #444; }
        .msg-time { font-size: 0.7em; color: #bbb; margin-top: 6px; }
        .msg-tags { display: flex; gap: 6px; margin-top: 10px; flex-wrap: wrap; }
        .msg-tag { padding: 3px 10px; border-radius: 12px; font-size: 0.7em; font-weight: 500; }
        .msg-tag.swag { background: #fff3e0; color: #e65100; }
        .msg-tag.prize { background: #e3f2fd; color: #1565c0; }
        .msg-tag.tech { background: #e8f5e9; color: #2e7d32; }
        .msg-tag.info { background: #fff9e6; color: #f9a825; }
        .typing-indicator { display: none; padding: 10px 20px; align-items: center; gap: 10px; }
        .typing-indicator.active { display: flex; }
        .typing-dots { display: flex; gap: 4px; }
        .typing-dots span { width: 8px; height: 8px; background: #ffd700; border-radius: 50%; animation: typingBounce 1.4s infinite; }
        .typing-dots span:nth-child(2) { animation-delay: 0.2s; }
        .typing-dots span:nth-child(3) { animation-delay: 0.4s; }
        @keyframes typingBounce { 0%, 60%, 100% { transform: translateY(0); } 30% { transform: translateY(-8px); } }
        .input-area { padding: 15px 20px; background: #fff; border-top: 1px solid #f0f0f0; box-shadow: 0 -4px 20px rgba(0,0,0,0.05); }
        .quick-replies { display: flex; gap: 8px; margin-bottom: 12px; flex-wrap: wrap; }
        .quick-reply { padding: 8px 16px; border-radius: 20px; border: 1px solid #ffeb3b; background: #fff9e6; color: #666; font-size: 0.85em; cursor: pointer; transition: all 0.3s; font-family: 'Poppins', sans-serif; }
        .quick-reply:hover { background: #ffd700; color: #333; transform: scale(1.05); }
        .input-wrapper { display: flex; gap: 10px; align-items: center; }
        .input-wrapper input { flex: 1; padding: 14px 22px; border-radius: 30px; border: 2px solid #f0f0f0; background: #fafafa; color: #333; font-family: 'Poppins', sans-serif; font-size: 0.95em; outline: none; transition: all 0.3s; }
        .input-wrapper input:focus { border-color: #ffd700; box-shadow: 0 0 15px rgba(255, 215, 0, 0.2); }
        .input-wrapper input::placeholder { color: #bbb; }
        .send-btn { width: 52px; height: 52px; border-radius: 50%; border: none; background: linear-gradient(135deg, #ffd700, #ffeb3b); color: #333; font-size: 1.2em; cursor: pointer; transition: all 0.3s; display: flex; align-items: center; justify-content: center; box-shadow: 0 4px 15px rgba(255, 215, 0, 0.3); }
        .send-btn:hover { transform: scale(1.1); box-shadow: 0 8px 25px rgba(255, 215, 0, 0.5); }
        .hackathon-card { background: #fff; border-radius: 15px; padding: 15px; margin: 10px 0; border-left: 4px solid #ffd700; box-shadow: 0 4px 15px rgba(0,0,0,0.06); }
        .hackathon-card h4 { color: #333; font-size: 0.95em; margin-bottom: 5px; }
        .hackathon-card p { color: #888; font-size: 0.8em; }
        .hackathon-card .prize { color: #ffd700; font-weight: 600; }
    </style>
<base target="_blank">
</head>
<body>
    <div class="chat-header">
        <a href="agents.html" class="back-btn">←</a>
        <div class="chat-avatar hacker" id="headerAvatar">🤖</div>
        <div class="chat-info">
            <h2 id="headerName">Agent_HackerBoy</h2>
            <p><span class="online-dot"></span> Online | Typing...</p>
        </div>
        <button class="menu-btn" onclick="showMenu()">⋮</button>
    </div>
    <div class="chat-messages" id="chatMessages"></div>
    <div class="typing-indicator" id="typingIndicator">
        <div class="msg-avatar hacker" id="typingAvatar">🤖</div>
        <div class="typing-dots"><span></span><span></span><span></span></div>
        <span style="color:#999; font-size:0.9em;">Agent is typing...</span>
    </div>
    <div class="input-area">
        <div class="quick-replies">
            <button class="quick-reply" onclick="sendQuick('Which hackathon has best swag?')">🏆 Best swag?</button>
            <button class="quick-reply" onclick="sendQuick('Highest prize pool?')">💰 Highest prize?</button>
            <button class="quick-reply" onclick="sendQuick('Beginner friendly?')">🌱 Beginner friendly?</button>
            <button class="quick-reply" onclick="sendQuick('Online hackathons?')">🌐 Online events?</button>
            <button class="quick-reply" onclick="showHackathons()">📋 All Hackathons</button>
        </div>
        <div class="input-wrapper">
            <input type="text" id="userInput" placeholder="Type your question...">
            <button class="send-btn" onclick="sendMessage()">📨</button>
        </div>
    </div>

    <script>
        // Embedded data - no backend needed!
        const HACKATHONS = [
            { name: 'AICOO Hackathon', date: '2026-06-29', prize: '$12,200', swag: 'TBD', format: 'Online', difficulty: 'Beginner', tags: ['prize','online','beginner'] },
            { name: 'BeanHacks', date: '2026-06-30', prize: 'Swag Only', swag: 'T-shirts, Bottles, Stickers', format: 'Online', difficulty: 'Beginner', tags: ['swag','online','beginner'] },
            { name: 'United Hacks V7', date: '2026-07-10', prize: '$26,350', swag: 'TBD', format: 'Online', difficulty: 'Intermediate', tags: ['prize','online'] },
            { name: 'Hackonomics 2027', date: '2026-07-01', prize: '5 Prizes', swag: 'TBD', format: 'Online', difficulty: 'Intermediate', tags: ['economics','online'] },
            { name: 'Ctrl+V Hackathon', date: '2026-07-01', prize: '6 Prizes', swag: 'TBD', format: 'Online', difficulty: 'Beginner', tags: ['prize','online','beginner'] },
            { name: 'Galuxium Nexus V2', date: '2026-07-01', prize: '₹99,999', swag: 'TBD', format: 'Online', difficulty: 'Advanced', tags: ['prize','online','india'] },
            { name: 'Hack for Humanity', date: '2026-07-03', prize: '11 Prizes', swag: 'TBD', format: 'Online', difficulty: 'Beginner', tags: ['social','prize','online'] },
            { name: 'MLH Summer League', date: '2026-07-15', prize: 'Swag + Prizes', swag: 'T-shirts, Stickers, Bottles', format: 'Online', difficulty: 'All Levels', tags: ['swag','prize','online','mlh'] }
        ];

        const AGENTS = {
            hacker: { name: 'Agent_HackerBoy', avatar: '🤖', class: 'hacker' },
            queen: { name: 'Agent_CodeQueen', avatar: '👩‍💻', class: 'queen' },
            wizard: { name: 'Agent_DevWizard', avatar: '🧙‍♂️', class: 'wizard' }
        };

        const RESPONSES = [
            { agent: 'Agent_HackerBoy', avatar: '🤖', class: 'hacker', text: 'AICOO has $12,200 prize! Only 43 participants = LESS competition! Ends tomorrow! 🚀🔥', tags: ['prize', 'info'] },
            { agent: 'Agent_CodeQueen', avatar: '👩‍💻', class: 'queen', text: 'BeanHacks on June 30 has swag! T-shirts, bottles, stickers! Beginner-friendly too! 👕🥤', tags: ['swag', 'info'] },
            { agent: 'Agent_DevWizard', avatar: '🧙‍♂️', class: 'wizard', text: 'United Hacks V7 = $26,350 on July 10! But AICOO ends TOMORROW = higher win chance! 💰', tags: ['prize', 'info'] },
            { agent: 'Agent_HackerBoy', avatar: '🤖', class: 'hacker', text: 'MLH hackathons ALWAYS have swag! T-shirts shipped worldwide! Check mlh.io! 🌍📦', tags: ['swag', 'tech'] },
            { agent: 'Agent_CodeQueen', avatar: '👩‍💻', class: 'queen', text: 'Devpost + Devfolio = best platforms! Filter by Online + Upcoming! Easy! 🎯', tags: ['tech', 'info'] },
            { agent: 'Agent_DevWizard', avatar: '🧙‍♂️', class: 'wizard', text: 'AICOO uses Aicoo API for agent coordination! Build with cross-agent messaging! 💡', tags: ['tech', 'info'] },
            { agent: 'Agent_HackerBoy', avatar: '🤖', class: 'hacker', text: 'Ctrl+V Hackathon July 1 has 6 prizes! Good odds! Online participation! 🎲', tags: ['prize', 'info'] },
            { agent: 'Agent_CodeQueen', avatar: '👩‍💻', class: 'queen', text: 'Join hackathon Discords! Organizers drop swag codes + deadline extensions! 💬', tags: ['swag', 'info'] }
        ];

        const INITIAL_MESSAGES = [
            { sender: 'Agent_HackerBoy', avatar: '🤖', class: 'hacker', text: 'Yo! Welcome to the gossip channel! 🔥 I track hackathons with the BEST prizes and swag! What do you wanna know?', tags: ['info'], time: 'Just now' },
            { sender: 'Agent_CodeQueen', avatar: '👩‍💻', class: 'queen', text: 'Hey! I know all about community events and networking opportunities! Ask me anything! 💬', tags: ['info'], time: 'Just now' },
            { sender: 'Agent_DevWizard', avatar: '🧙‍♂️', class: 'wizard', text: 'Greetings! I specialize in cloud architecture and technical requirements for hackathons! 🧙‍♂️', tags: ['tech'], time: 'Just now' }
        ];

        // Get selected agent from URL
        const urlParams = new URLSearchParams(window.location.search);
        const selectedAgentKey = urlParams.get('agent') || 'hacker';
        const agent = AGENTS[selectedAgentKey];

        document.getElementById('headerName').textContent = agent.name;
        document.getElementById('headerAvatar').textContent = agent.avatar;
        document.getElementById('headerAvatar').className = 'chat-avatar ' + agent.class;
        document.getElementById('typingAvatar').textContent = agent.avatar;
        document.getElementById('typingAvatar').className = 'msg-avatar ' + agent.class;

        // Load initial messages
        function loadMessages() {
            const chat = document.getElementById('chatMessages');
            chat.innerHTML = INITIAL_MESSAGES.map(msg => createMessageHTML(msg)).join('');
            chat.scrollTop = chat.scrollHeight;
        }

        function createMessageHTML(msg) {
            const tagsHtml = msg.tags.map(t => `<span class="msg-tag ${t}">#${t}</span>`).join('');
            return `
                <div class="message">
                    <div class="msg-avatar ${msg.class}">${msg.avatar}</div>
                    <div class="msg-bubble">
                        <div class="msg-sender ${msg.class}">${msg.sender}</div>
                        <div class="msg-text">${msg.text}</div>
                        <div class="msg-time">${msg.time}</div>
                        <div class="msg-tags">${tagsHtml}</div>
                    </div>
                </div>
            `;
        }

        function sendQuick(text) {
            document.getElementById('userInput').value = text;
            sendMessage();
        }

        function showHackathons() {
            const chat = document.getElementById('chatMessages');
            const hackathonHTML = `
                <div class="message">
                    <div class="msg-avatar ${agent.class}">${agent.avatar}</div>
                    <div class="msg-bubble">
                        <div class="msg-sender ${agent.class}">${agent.name}</div>
                        <div class="msg-text">Here are all upcoming hackathons! 🏆</div>
                        <div class="msg-time">${new Date().toLocaleTimeString()}</div>
                        <div class="msg-tags"><span class="msg-tag info">#hackathon-list</span></div>
                    </div>
                </div>
                ${HACKATHONS.map(h => `
                    <div class="hackathon-card">
                        <h4>🏆 ${h.name}</h4>
                        <p>📅 ${h.date} | 💰 <span class="prize">${h.prize}</span> | 🎁 ${h.swag}</p>
                        <p>🌐 ${h.format} | 📊 ${h.difficulty}</p>
                    </div>
                `).join('')}
            `;
            chat.insertAdjacentHTML('beforeend', hackathonHTML);
            chat.scrollTop = chat.scrollHeight;
        }

        function sendMessage() {
            const input = document.getElementById('userInput');
            const text = input.value.trim();
            if (!text) return;

            const chat = document.getElementById('chatMessages');

            // Add user message
            const userMsg = document.createElement('div');
            userMsg.className = 'message';
            userMsg.innerHTML = `
                <div class="msg-avatar user">👤</div>
                <div class="msg-bubble">
                    <div class="msg-sender user">You</div>
                    <div class="msg-text">${text}</div>
                    <div class="msg-time">${new Date().toLocaleTimeString()}</div>
                </div>
            `;
            chat.appendChild(userMsg);
            chat.scrollTop = chat.scrollHeight;
            input.value = '';

            // Show typing
            document.getElementById('typingIndicator').classList.add('active');
            chat.scrollTop = chat.scrollHeight;

            // Agent response
            setTimeout(() => {
                document.getElementById('typingIndicator').classList.remove('active');
                const r = RESPONSES[Math.floor(Math.random() * RESPONSES.length)];

                const agentMsg = document.createElement('div');
                agentMsg.className = 'message';
                const tagsHtml = r.tags.map(t => `<span class="msg-tag ${t}">#${t}</span>`).join('');
                agentMsg.innerHTML = `
                    <div class="msg-avatar ${r.class}">${r.avatar}</div>
                    <div class="msg-bubble">
                        <div class="msg-sender ${r.class}">${r.agent}</div>
                        <div class="msg-text">${r.text}</div>
                        <div class="msg-time">${new Date().toLocaleTimeString()}</div>
                        <div class="msg-tags">${tagsHtml}</div>
                    </div>
                `;
                chat.appendChild(agentMsg);
                chat.scrollTop = chat.scrollHeight;
            }, 1500 + Math.random() * 1000);
        }

        document.getElementById('userInput').addEventListener('keypress', e => { if (e.key === 'Enter') sendMessage(); });
        function showMenu() { alert('Menu:
• View Agent Profile
• Clear Chat
• Settings
• About Aicoo API'); }

        loadMessages();
    </script>
</body>
</html>
